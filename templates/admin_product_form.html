{% extends "base.html" %}

{% block content %}
<h2>{{ title }}</h2>

<form method="POST">
    <div class="mb-3">
        <label class="form-label">Название книги</label>
        <input type="text" name="name" class="form-control" value="{{ product[1] if product else '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Автор</label>
        <input type="text" name="author" class="form-control" value="{{ product[2] if product else '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Цена (₽)</label>
        <input type="number" step="0.01" name="price" class="form-control" value="{{ product[3] if product else '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Количество</label>
        <input type="number" name="quantity" class="form-control" value="{{ product[4] if product else '0' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Категория</label>
        <input type="text" name="category" class="form-control" value="{{ product[5] if product else '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Описание</label>
        <textarea name="description" class="form-control" rows="3">{{ product[6] if product else '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="/admin/products" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
