{% extends "base.html" %}

{% block content %}
<h2 class="mb-4"><i class="fas fa-user-circle"></i> Профиль пользователя</h2>

<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-body text-center">
                <div class="avatar-container mb-3">
                    {% if user.avatar %}
                        <img src="{{ user.avatar }}" style="width: 128px; height: 128px; border-radius: 50%; object-fit: cover; border: 3px solid #667eea;">
                    {% else %}
                        <div style="width: 128px; height: 128px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; margin: 0 auto; color: white; font-weight: bold; font-size: 48px;">
                            {{ user.username[0].upper() if user.username else 'U' }}
                        </div>
                    {% endif %}
                    <h4 class="mt-3">{{ user.username }}</h4>
                    <p class="text-muted">{{ user.email }}</p>
                </div>
                
                <form method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="action" value="update_avatar">
                    <div class="mb-3">
                        <label for="avatar-input" class="btn btn-outline-primary">
                            <i class="fas fa-camera"></i> Выбрать фото
                        </label>
                        <input type="file" name="avatar" id="avatar-input" accept="image/*" style="display: none;" onchange="this.nextElementSibling.textContent = this.files[0] ? this.files[0].name : 'Файл не выбран'">
                        <span class="ms-2 text-muted" style="font-size: 0.8rem;">Файл не выбран</span>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-upload"></i> Сменить аватар
                    </button>
                </form>
                
                <form method="POST" class="mt-2">
                    <input type="hidden" name="action" value="delete_avatar">
                    <button type="submit" class="btn btn-danger w-100" onclick="return confirm('Удалить аватар?')">
                        <i class="fas fa-trash"></i> Удалить аватар
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('avatar-input')?.addEventListener('change', function(e) {
        const fileNameSpan = this.nextElementSibling;
        if (fileNameSpan) {
            fileNameSpan.textContent = this.files[0] ? this.files[0].name : 'Файл не выбран';
        }
    });
</script>
{% endblock %}
