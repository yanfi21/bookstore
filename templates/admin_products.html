{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-box"></i> Управление книгами</h2>
    <a href="/admin/add-product" class="btn btn-primary">
        <i class="fas fa-plus"></i> Добавить книгу
    </a>
</div>

<div class="table-responsive">
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Автор</th>
                <th>Цена</th>
                <th>В наличии</th>
                <th>Категория</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for p in products %}
            <tr>
                <td>{{ p[0] }}</td>
                <td>{{ p[1] }}</td>
                <td>{{ p[2] }}</td>
                <td>{{ p[3] }} ₽</td>
                <td>{{ p[4] }}</td>
                <td>{{ p[5] }}</td>
                <td>
                    <a href="/admin/edit-product/{{ p[0] }}" class="btn btn-sm btn-primary">✏️</a>
                    <a href="/admin/delete-product/{{ p[0] }}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить?')">🗑️</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
